# Render Blueprint for the charges service.
# Deploy: connect this repo in Render, point the Blueprint at charges-service/.
#
# Three resources:
#   - a Postgres database (the charges store)
#   - a web service (FastAPI query API — persistent, holds the connection pool)
#   - a cron job stub for the quarterly Prod199 re-baseline (Prod201 delta cron
#     to be added once recurring SFTP access is granted)

databases:
  - name: rockcap-charges-db
    plan: basic-256mb # bump if the 2.4M-row table + indexes need more headroom
    postgresMajorVersion: "16"

services:
  - type: web
    name: rockcap-charges-api
    runtime: python
    plan: starter # always-on (no spin-down / cold start)
    rootDir: charges-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rockcap-charges-db
          property: connectionString
      - key: CHARGES_API_KEY
        sync: false # set manually in the Render dashboard (shared with Convex)

  # Quarterly re-baseline. Render cron jobs are meant to boot-run-exit, so the
  # cold start is irrelevant. The SFTP fetch + extract step is a TODO pending
  # Bulk Cloud Gateway access; for now the file is loaded manually via etl.load.
  - type: cron
    name: rockcap-charges-refresh
    runtime: python
    plan: starter
    rootDir: charges-service
    schedule: "0 3 1 */3 *" # 03:00 on the 1st, every 3rd month
    buildCommand: pip install -r requirements.txt
    startCommand: "echo 'TODO: sftp-pull latest Prod199 then python -m etl.load --dir ...'"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rockcap-charges-db
          property: connectionString
