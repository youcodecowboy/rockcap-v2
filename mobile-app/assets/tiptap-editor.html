<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; color: #0a0a0a; background: #fff; }

  /* Toolbar */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; gap: 2px; padding: 8px 12px;
    background: #fff; border-bottom: 1px solid #e5e5e5;
    flex-wrap: wrap; align-items: center;
  }
  .toolbar button {
    width: 32px; height: 32px; border: none; background: transparent;
    border-radius: 6px; font-size: 13px; font-weight: 600; color: #525252;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .toolbar button:active, .toolbar button.is-active {
    background: #f5f5f4; color: #0a0a0a;
  }
  .toolbar .sep { width: 1px; height: 20px; background: #e5e5e5; margin: 0 4px; }

  /* Editor */
  .ProseMirror { padding: 16px; min-height: 300px; outline: none; line-height: 1.6; }
  .ProseMirror p { margin-bottom: 0.5em; }
  .ProseMirror h1 { font-size: 1.5em; font-weight: 700; margin-bottom: 0.3em; }
  .ProseMirror h2 { font-size: 1.25em; font-weight: 600; margin-bottom: 0.3em; }
  .ProseMirror ul, .ProseMirror ol { padding-left: 1.5em; margin-bottom: 0.5em; }
  .ProseMirror li { margin-bottom: 0.2em; }
  .ProseMirror blockquote {
    border-left: 3px solid #e5e5e5; padding-left: 12px; color: #525252; margin-bottom: 0.5em;
  }
  .ProseMirror a { color: #3b82f6; text-decoration: underline; }
  .ProseMirror hr { border: none; border-top: 1px solid #e5e5e5; margin: 1em 0; }
  .ProseMirror strong { font-weight: 600; }
  .ProseMirror em { font-style: italic; }
  .ProseMirror u { text-decoration: underline; }
  .ProseMirror s { text-decoration: line-through; }

  /* Mention styling */
  .mention {
    background: #dbeafe; color: #1d4ed8; padding: 1px 4px; border-radius: 4px;
    font-weight: 500; font-size: 0.95em;
  }

  /* Placeholder */
  .ProseMirror p.is-editor-empty:first-child::before {
    content: attr(data-placeholder);
    float: left; color: #d4d4d4; pointer-events: none; height: 0;
  }
</style>
</head>
<body>
<div class="toolbar" id="toolbar">
  <button onclick="cmd('toggleBold')" id="btn-bold"><b>B</b></button>
  <button onclick="cmd('toggleItalic')" id="btn-italic"><i>I</i></button>
  <button onclick="cmd('toggleUnderline')" id="btn-underline"><u>U</u></button>
  <button onclick="cmd('toggleStrike')" id="btn-strike"><s>S</s></button>
  <div class="sep"></div>
  <button onclick="cmd('toggleHeading', {level:1})" id="btn-h1">H1</button>
  <button onclick="cmd('toggleHeading', {level:2})" id="btn-h2">H2</button>
  <div class="sep"></div>
  <button onclick="cmd('toggleBulletList')" id="btn-ul">&#8226;</button>
  <button onclick="cmd('toggleOrderedList')" id="btn-ol">1.</button>
  <div class="sep"></div>
  <button onclick="cmd('toggleBlockquote')" id="btn-bq">&ldquo;</button>
  <button onclick="cmd('setHorizontalRule')" id="btn-hr">&mdash;</button>
</div>
<div id="editor"></div>

<div id="status" style="padding:12px;color:#a3a3a3;font-family:-apple-system,monospace;font-size:11px;display:none;"></div>
<script>
  // Diagnostic surface — if module load fails, we show it on-screen and
  // also post the error back to RN so device logs carry the cause.
  window.__tiptapReport = function(err) {
    var s = document.getElementById('status');
    if (s) { s.style.display = 'block'; s.textContent = 'Editor load failed: ' + err; }
    window.ReactNativeWebView?.postMessage(JSON.stringify({ type: 'error', error: String(err) }));
  };
  window.addEventListener('error', function(e) {
    window.__tiptapReport(e.message || e.error || 'unknown');
  });
</script>
<script type="module">
  // esm.sh auto-resolves the @tiptap/pm/* peer dependencies that the UMD
  // build silently required but never loaded — that's why the UMD approach
  // left `window['@tiptap/core']` undefined and the editor never started.
  try {
    const core = await import('https://esm.sh/@tiptap/core@2.11.7');
    const starter = await import('https://esm.sh/@tiptap/starter-kit@2.11.7');
    const underline = await import('https://esm.sh/@tiptap/extension-underline@2.11.7');
    const placeholder = await import('https://esm.sh/@tiptap/extension-placeholder@2.11.7');
    const mention = await import('https://esm.sh/@tiptap/extension-mention@2.11.7');
    window.__tiptap = {
      Editor: core.Editor,
      StarterKit: starter.default || starter.StarterKit,
      Underline: underline.Underline || underline.default,
      Placeholder: placeholder.Placeholder || placeholder.default,
      Mention: mention.Mention || mention.default,
    };
    window.dispatchEvent(new Event('tiptap-ready'));
  } catch (err) {
    window.__tiptapReport(err?.message || err);
  }
</script>
<script>
(function() {
  let Editor, StarterKit, Underline, Placeholder, Mention;

  let editor;

  function init(content, placeholder) {
    // Defensive: if a previous editor instance exists (double-init race
    // from the RN side), destroy it before creating a new one — otherwise
    // ProseMirror mounts over leftover DOM and the editor becomes
    // unresponsive without throwing.
    if (editor) {
      editor.destroy();
      document.getElementById('editor').innerHTML = '';
    }
    editor = new Editor({
      element: document.getElementById('editor'),
      extensions: [
        StarterKit,
        Underline,
        Placeholder.configure({ placeholder: placeholder || 'Start writing...' }),
        Mention.configure({
          HTMLAttributes: { class: 'mention' },
          renderText({ node }) { return node.attrs.label ? '@' + node.attrs.label : '@' + node.attrs.id; },
        }),
      ],
      content: content || '',
      onUpdate: () => {
        const json = editor.getJSON();
        window.ReactNativeWebView?.postMessage(JSON.stringify({ type: 'content', data: json }));
      },
      onSelectionUpdate: () => updateToolbar(),
    });
    updateToolbar();
  }

  function updateToolbar() {
    if (!editor) return;
    const marks = ['bold','italic','underline','strike'];
    marks.forEach(m => {
      const btn = document.getElementById('btn-' + m.charAt(0));
      if (btn) btn.classList.toggle('is-active', editor.isActive(m));
    });
    document.getElementById('btn-bold')?.classList.toggle('is-active', editor.isActive('bold'));
    document.getElementById('btn-italic')?.classList.toggle('is-active', editor.isActive('italic'));
    document.getElementById('btn-underline')?.classList.toggle('is-active', editor.isActive('underline'));
    document.getElementById('btn-strike')?.classList.toggle('is-active', editor.isActive('strike'));
    document.getElementById('btn-h1')?.classList.toggle('is-active', editor.isActive('heading', {level:1}));
    document.getElementById('btn-h2')?.classList.toggle('is-active', editor.isActive('heading', {level:2}));
    document.getElementById('btn-ul')?.classList.toggle('is-active', editor.isActive('bulletList'));
    document.getElementById('btn-ol')?.classList.toggle('is-active', editor.isActive('orderedList'));
    document.getElementById('btn-bq')?.classList.toggle('is-active', editor.isActive('blockquote'));
  }

  window.cmd = function(name, attrs) {
    if (!editor) return;
    editor.chain().focus()[name](attrs).run();
    updateToolbar();
  };

  // Listen for messages from React Native
  window.addEventListener('message', function(e) {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'init') {
        let content = msg.content;
        if (typeof content === 'string') {
          try { content = JSON.parse(content); } catch {}
        }
        init(content, msg.placeholder);
      }
      if (msg.type === 'getContent') {
        const json = editor?.getJSON();
        window.ReactNativeWebView?.postMessage(JSON.stringify({ type: 'content', data: json }));
      }
    } catch {}
  });

  // Also handle Android
  document.addEventListener('message', function(e) {
    window.dispatchEvent(new MessageEvent('message', { data: e.data }));
  });

  // Signal 'ready' only once the Tiptap module bundle has actually loaded —
  // otherwise RN sends `init`, we try to `new Editor(...)` with Editor
  // undefined, and the editor silently fails to attach.
  function onTiptapReady() {
    ({ Editor, StarterKit, Underline, Placeholder, Mention } = window.__tiptap);
    window.ReactNativeWebView?.postMessage(JSON.stringify({ type: 'ready' }));
  }
  if (window.__tiptap) {
    onTiptapReady();
  } else {
    window.addEventListener('tiptap-ready', onTiptapReady, { once: true });
  }
})();
</script>
</body>
</html>
